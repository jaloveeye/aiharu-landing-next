name: AI 뉴스 수집

on:
  schedule:
    # 매일 UTC 04:00 실행 (한국시간 13:00)
    - cron: "0 4 * * *"
  workflow_dispatch: # 수동 실행 가능
    inputs:
      run_dry_run:
        description: "수집된 데이터를 실제 저장하지 않고 점검만 수행"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ai-news-collector
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci --no-audit --no-fund

      - name: 환경 변수 확인
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          echo "환경 변수 확인 중..."
          if [ -z "$OPENAI_API_KEY" ]; then echo "❌ OPENAI_API_KEY 누락"; else echo "✅ OPENAI_API_KEY 설정됨"; fi
          if [ -z "$NEWS_API_KEY" ]; then echo "❌ NEWS_API_KEY 누락"; else echo "✅ NEWS_API_KEY 설정됨"; fi
          if [ -z "$GNEWS_API_KEY" ]; then echo "❌ GNEWS_API_KEY 누락"; else echo "✅ GNEWS_API_KEY 설정됨"; fi
          if [ -z "$SUPABASE_URL" ]; then echo "❌ SUPABASE_URL 누락"; else echo "✅ SUPABASE_URL 설정됨"; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "❌ SUPABASE_SERVICE_ROLE_KEY 누락"; else echo "✅ SUPABASE_SERVICE_ROLE_KEY 설정됨"; fi

      - name: 뉴스 수집 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.run_dry_run }}
        run: |
          set -euo pipefail
          echo "🚀 AI 뉴스 수집 스크립트 실행 시작..."
          echo "실행 시간: $(date)"
          echo "현재 시간대: $(date +%Z)"
          echo "UTC 시간: $(date -u)"

          mkdir -p "${RUNNER_TEMP}/collect-news"
          {
            echo "실행 방식: ${{ github.event_name }}"
            echo "작업 타입: ${DRY_RUN:-false}"
            echo "실행 시간: $(date -u)"
          } > "${RUNNER_TEMP}/collect-news/metadata.log"

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "🔎 DRY RUN 모드로 실행합니다."
            DRY_RUN=1 node scripts/collect-ai-news.js 2>&1 | tee -a "${RUNNER_TEMP}/collect-news/metadata.log"
          else
            node scripts/collect-ai-news.js 2>&1 | tee -a "${RUNNER_TEMP}/collect-news/metadata.log"
          fi
          
          echo "✅ 뉴스 수집 스크립트 실행 완료"

      - name: 실행 로그 보존
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-ai-news-logs
          path: ${{ runner.temp }}/collect-news
          if-no-files-found: ignore

      - name: 실행 요약 기록
        if: always()
        run: |
          {
            echo "## AI 뉴스 수집 실행 요약";
            echo "";
            echo "- 실행 방식: ${{ github.event_name }}";
            echo "- dry-run: ${DRY_RUN:-false}";
            echo "- 작업 상태: ${{ job.status }}";
            echo "- 실행 시간: $(date -u)";
            echo "";
            echo "### Raw Log";
            echo "\`\`\`";
            if [ -f "${RUNNER_TEMP}/collect-news/metadata.log" ]; then
              tail -n 80 "${RUNNER_TEMP}/collect-news/metadata.log";
            else
              echo "로그 파일을 찾을 수 없습니다.";
            fi
            echo "\`\`\`";
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 결과 로그
        if: always()
        run: |
          echo "📊 뉴스 수집 작업 완료 상태:"
          echo "완료 시간: $(date)"
          echo "워크플로우 상태: ${{ job.status }}"
          echo "실행 방식: ${{ github.event_name }}"
